<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restablecer Contraseña | Agendatina</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Manrope:wght@600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <script>
        tailwind.config = { theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'], display: ['Manrope', 'sans-serif'] }, colors: { primary: '#3b82f6', secondary: '#8b5cf6' } } } };
    </script>
</head>
<body class="bg-slate-50 text-slate-900 antialiased min-h-screen flex items-center justify-center p-6 relative overflow-hidden">
    <div class="absolute top-0 left-0 w-[500px] h-[500px] bg-primary/10 rounded-full blur-[100px] -translate-x-1/2 -translate-y-1/2 z-0"></div>
    <div class="bg-white p-8 md:p-12 rounded-[2rem] shadow-2xl border border-slate-100 max-w-md w-full relative z-10">
        <div class="text-center mb-8">
            <span class="material-symbols-outlined text-primary text-5xl mb-4">lock_reset</span>
            <h1 class="text-2xl font-extrabold font-display">Nueva Contraseña</h1>
            <p class="text-slate-500 text-sm mt-2">Ingresa tu nueva contraseña para recuperar el acceso a tu cuenta.</p>
        </div>

        <form id="resetForm" class="flex flex-col gap-5">
            <input type="hidden" id="resetToken" name="token">
            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-1">Nueva Contraseña</label>
                <div class="relative">
                    <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-sm">lock</span>
                    <input type="password" name="password" required minlength="6" maxlength="14" class="w-full bg-slate-50 border border-slate-200 rounded-xl pl-10 pr-12 py-3 focus:ring-2 focus:ring-primary outline-none transition-all" placeholder="De 6 a 14 caracteres">
                    <button type="button" onclick="const input = this.previousElementSibling; if(input.type === 'password') { input.type = 'text'; this.firstElementChild.textContent = 'visibility_off'; } else { input.type = 'password'; this.firstElementChild.textContent = 'visibility'; }" class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-primary transition-colors flex items-center justify-center">
                        <span class="material-symbols-outlined text-[20px]">visibility</span>
                    </button>
                </div>
            </div>
            <div id="resetMessage" class="hidden p-3 rounded-lg text-sm font-medium text-center"></div>
            <button type="submit" id="btnSubmit" class="w-full bg-primary hover:bg-primary/90 text-white py-3.5 rounded-xl font-bold text-lg mt-2 shadow-lg shadow-primary/20 transition-all">
                Guardar Contraseña
            </button>
            <a href="login.html" class="text-center text-sm font-bold text-slate-500 hover:text-primary mt-4 block">Volver al inicio de sesión</a>
        </form>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const token = new URLSearchParams(window.location.search).get('token');
            if (!token) {
                document.getElementById('resetMessage').className = 'p-3 rounded-lg text-sm font-medium text-center bg-red-100 text-red-800 block';
                document.getElementById('resetMessage').textContent = 'Enlace inválido. Por favor solicita uno nuevo.';
                document.getElementById('btnSubmit').disabled = true;
            } else {
                document.getElementById('resetToken').value = token;
            }

            document.getElementById('resetForm').addEventListener('submit', function(e) {
                e.preventDefault();
                const msgDiv = document.getElementById('resetMessage');
                fetch('backend/restablecer_password.php', { method: 'POST', body: new FormData(this) })
                .then(res => res.json())
                .then(data => {
                    if (data.success) { msgDiv.className = 'p-3 rounded-lg text-sm font-medium text-center bg-green-100 text-green-800 block'; msgDiv.textContent = '¡Contraseña actualizada! Redirigiendo...'; setTimeout(() => window.location.href = 'login.html', 2000); } 
                    else { msgDiv.className = 'p-3 rounded-lg text-sm font-medium text-center bg-red-100 text-red-800 block'; msgDiv.textContent = data.error || 'Error al actualizar.'; }
                });
            });
        });
    </script>
</body>
</html>
