<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Iniciar Sesión | Agendatina</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%233b82f6'><path d='M19 4h-1V2h-2v2H8V2H6v2H5c-1.11 0-1.99.9-1.99 2L3 20c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 16H5V10h14v10zm0-12H5V6h14v2zm-2.5 5.43l-4.57 4.57-2.43-2.43 1.41-1.41 1.02 1.02 3.16-3.16 1.41 1.41z'/></svg>">
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Manrope:wght@600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <link rel="preload" href="backend/css/global.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link rel="stylesheet" href="backend/css/global.css"></noscript>
    <script>
        tailwind.config = {
            theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'], display: ['Manrope', 'sans-serif'] }, colors: { primary: '#3b82f6', secondary: '#8b5cf6' } } }
        }
    </script>
</head>
<body class="bg-slate-50 text-slate-900 antialiased min-h-screen flex items-center justify-center p-6 relative overflow-hidden">
    
    <!-- Efectos de fondo -->
    <div class="absolute top-0 left-0 w-[500px] h-[500px] bg-primary/10 rounded-full blur-[100px] -translate-x-1/2 -translate-y-1/2 z-0"></div>
    <div class="absolute bottom-0 right-0 w-[500px] h-[500px] bg-secondary/10 rounded-full blur-[100px] translate-x-1/2 translate-y-1/2 z-0"></div>

    <div class="bg-white p-8 md:p-12 rounded-[2rem] shadow-2xl border border-slate-100 max-w-md w-full relative z-10">
        <div class="text-center mb-8">
            <a href="index.html" class="inline-flex items-center gap-2 mb-6 hover:opacity-80 transition-opacity">
                <span class="material-symbols-outlined text-primary text-3xl">event_available</span>
                <span class="font-bold text-2xl tracking-tight">Agenda<span class="text-secondary">tina</span></span>
            </a>
            <h1 class="text-2xl font-extrabold font-display">Bienvenido de nuevo</h1>
            <p class="text-slate-500 text-sm mt-2">Ingresa tus credenciales para acceder a tu panel.</p>
        </div>

        <form id="loginForm" class="flex flex-col gap-5">
            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-1">Correo Electrónico</label>
                <div class="relative">
                    <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-sm">mail</span>
                    <input type="email" name="username" required class="w-full bg-slate-50 border border-slate-200 rounded-xl pl-10 pr-4 py-3 focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all" placeholder="tu@email.com">
                </div>
            </div>
            <div>
                <div class="flex justify-between items-center mb-1">
                    <label class="block text-sm font-semibold text-slate-700">Contraseña</label>
                    <a href="#" onclick="openForgotModal(event)" class="text-xs text-primary font-medium hover:underline">¿Olvidaste tu contraseña?</a>
                </div>
                <div class="relative">
                    <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-sm">lock</span>
                    <input type="password" name="password" required class="w-full bg-slate-50 border border-slate-200 rounded-xl pl-10 pr-12 py-3 focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all" placeholder="••••••••">
                    <button type="button" onclick="const input = this.previousElementSibling; if(input.type === 'password') { input.type = 'text'; this.firstElementChild.textContent = 'visibility_off'; } else { input.type = 'password'; this.firstElementChild.textContent = 'visibility'; }" class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-primary transition-colors flex items-center justify-center" title="Mostrar/Ocultar contraseña">
                        <span class="material-symbols-outlined text-[20px]">visibility</span>
                    </button>
                </div>
            </div>
            <div id="loginMessage" class="hidden p-3 rounded-lg text-sm font-medium bg-red-100 text-red-800 text-center" role="alert" aria-live="assertive"></div>
            <button type="submit" id="btnSubmit" class="w-full signature-glow text-white py-3.5 rounded-xl font-bold text-lg mt-2 shadow-lg shadow-primary/20 hover:brightness-110 active:scale-[0.98] transition-all">
                Ingresar al sistema
            </button>
        </form>
    </div>

    <!-- Modal Recuperar Contraseña -->
    <div id="forgotModal" class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-50 hidden flex items-center justify-center p-4 opacity-0 transition-opacity duration-300">
        <div class="bg-white rounded-3xl shadow-2xl border border-slate-100 max-w-sm w-full p-8 transform scale-95 transition-transform duration-300" id="forgotModalContent">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-bold font-display text-slate-800">Recuperar Acceso</h2>
                <button onclick="closeForgotModal()" class="text-slate-400 hover:text-red-500 transition-colors"><span class="material-symbols-outlined">close</span></button>
            </div>
            <p class="text-sm text-slate-500 mb-6">Ingresa tu correo registrado y te enviaremos un enlace para restablecer tu contraseña.</p>
            <form id="forgotForm" class="flex flex-col gap-4">
                <input type="email" name="email" required class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 focus:ring-2 focus:ring-primary outline-none transition-all" placeholder="tu@email.com">
                <div id="forgotMessage" class="hidden p-3 rounded-lg text-sm font-medium text-center" role="alert" aria-live="assertive"></div>
                <button type="submit" id="btnForgotSubmit" class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-3 rounded-xl transition-all">Enviar enlace</button>
            </form>
        </div>
    </div>

    <script src="backend/js/script.js" defer></script>
    <script src="backend/js/auth.js" defer></script>
</body>
</html>
