<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Super Admin | Agendatina</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%233b82f6'><path d='M19 4h-1V2h-2v2H8V2H6v2H5c-1.11 0-1.99.9-1.99 2L3 20c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 16H5V10h14v10zm0-12H5V6h14v2zm-2.5 5.43l-4.57 4.57-2.43-2.43 1.41-1.41 1.02 1.02 3.16-3.16 1.41 1.41z'/></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <style> body { font-family: 'Inter', sans-serif; } </style>
</head>
<body class="bg-slate-900 min-h-screen flex items-center justify-center p-6 text-slate-800">
    <div class="bg-white p-8 md:p-10 rounded-3xl shadow-2xl max-w-md w-full">
        <div class="text-center mb-8">
            <div class="w-20 h-20 bg-blue-100 rounded-full flex items-center justify-center mx-auto mb-4">
                <span class="material-symbols-outlined text-blue-600 text-5xl">admin_panel_settings</span>
            </div>
            <h1 class="text-2xl font-extrabold text-slate-800 tracking-tight">Super Admin</h1>
            <p class="text-slate-500 text-sm mt-1">Ingresa tus credenciales maestras.</p>
        </div>

        <form id="adminLoginForm" class="space-y-5">
            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-1.5">Usuario</label>
                <div class="relative">
                    <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-[20px]">person</span>
                    <input type="text" name="username" required class="w-full bg-slate-50 border border-slate-200 rounded-xl pl-10 pr-4 py-3 focus:ring-2 focus:ring-blue-500 outline-none transition-all" placeholder="Ej: superadmin">
                </div>
            </div>
            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-1.5">Contraseña</label>
                <div class="relative">
                    <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-[20px]">lock</span>
                    <input type="password" name="password" required class="w-full bg-slate-50 border border-slate-200 rounded-xl pl-10 pr-4 py-3 focus:ring-2 focus:ring-blue-500 outline-none transition-all" placeholder="••••••••">
                </div>
            </div>

            <div id="loginMessage" class="hidden p-3 rounded-xl text-sm font-medium text-center"></div>

            <button type="submit" id="btnSubmit" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-3.5 rounded-xl font-bold text-lg mt-2 shadow-lg shadow-blue-600/30 transition-all hover:-translate-y-0.5">
                Ingresar al Panel
            </button>
        </form>
    </div>
    
    <script>
        document.getElementById('adminLoginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = document.getElementById('btnSubmit');
            const msg = document.getElementById('loginMessage');
            
            btn.disabled = true;
            btn.innerHTML = '<span class="material-symbols-outlined animate-spin text-[20px] align-middle">refresh</span> Verificando...';
            msg.classList.add('hidden');

            fetch('../backend/admin_auth.php', { method: 'POST', body: new FormData(this) })
            .then(res => res.json())
            .then(data => {
                if(data.success) {
                    window.location.href = 'index.html';
                } else {
                    msg.textContent = data.error || 'Credenciales incorrectas';
                    msg.className = 'p-3 rounded-xl text-sm font-medium text-center bg-red-100 text-red-800 border border-red-200 mt-2';
                    msg.classList.remove('hidden');
                }
            })
            .catch(err => { msg.textContent = 'Error de conexión'; msg.className = 'p-3 rounded-xl text-sm font-medium text-center bg-red-100 text-red-800 border border-red-200 mt-2'; msg.classList.remove('hidden'); })
            .finally(() => { btn.disabled = false; btn.textContent = 'Ingresar al Panel'; });
        });
    </script>
</body>
</html>
