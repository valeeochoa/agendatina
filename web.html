<!DOCTYPE html>
<html lang="es" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cargando... | Agendatina</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%233b82f6'><path d='M19 4h-1V2h-2v2H8V2H6v2H5c-1.11 0-1.99.9-1.99 2L3 20c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 16H5V10h14v10zm0-12H5V6h14v2zm-2.5 5.43l-4.57 4.57-2.43-2.43 1.41-1.41 1.02 1.02 3.16-3.16 1.41 1.41z'/></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Manrope:wght@600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    
    <script>
        // Fuerza a que las rutas relativas se carguen desde la carpeta correcta (Evita error 404)
        const basePath = window.location.pathname.includes('/agendatina/') ? '/agendatina/' : '/';
        const baseEl = document.createElement('base');
        baseEl.href = basePath;
        document.head.insertBefore(baseEl, document.head.firstChild);
    </script>

    <script>
        tailwind.config = {
            theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'], display: ['Manrope', 'sans-serif'] }, colors: { primary: '#3b82f6', secondary: '#8b5cf6' } } }
        }
    </script>
    <style id="custom-styles"></style>
    <style>
        .service-card {
            opacity: 0;
            transform: translateY(30px);
            transition: opacity 0.5s ease-out, transform 0.5s ease-out;
        }
        .service-card.is-visible {
            opacity: 1;
            transform: translateY(0);
        }
        #publicUbicacionMaps iframe {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 antialiased min-h-screen flex flex-col">

    <!-- Pantalla de carga (Loader) -->
    <div id="globalLoader" class="fixed inset-0 bg-slate-50 z-[150] flex flex-col items-center justify-center transition-opacity duration-500">
        <span class="material-symbols-outlined text-primary text-6xl animate-spin mb-4">refresh</span>
        <h2 class="text-2xl font-bold text-slate-800 font-display">Cargando...</h2>
    </div>

    <!-- Navbar -->
    <nav class="bg-white/90 backdrop-blur-md border-b border-slate-200 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <span class="material-symbols-outlined text-primary text-3xl" id="navIcon">spa</span>
                <img id="navLogo" src="" alt="Logo" class="hidden h-10 w-auto object-contain">
                <span class="font-bold text-xl tracking-tight hidden sm:block" id="navTitle">Mi Negocio</span>
            </div>
            <a id="navReservarBtn" href="calendarioMensual.html" class="bg-primary text-white px-5 py-2.5 rounded-full font-bold text-sm hover:shadow-lg hover:-translate-y-0.5 transition-all">
                Reservar Turno
            </a>
        </div>
    </nav>

    <!-- Hero Section (Portada) -->
    <header class="relative pt-32 pb-40 px-6 flex items-center justify-center overflow-hidden bg-slate-900 text-white min-h-[60vh]">
        <!-- Fondo (Imagen o color) -->
        <div id="heroBackground" class="absolute inset-0 z-0 bg-cover bg-center bg-no-repeat opacity-40 transition-opacity duration-700"></div>
        <!-- Overlay gradiente -->
        <div class="absolute inset-0 z-0 bg-gradient-to-t from-slate-900 via-slate-900/60 to-transparent"></div>
        
        <div class="relative z-10 text-center max-w-3xl mx-auto">
            <h1 id="heroTitle" class="text-5xl md:text-7xl font-extrabold font-display mb-6 tracking-tight drop-shadow-lg">Bienvenidos</h1>
            <p id="heroSubtitle" class="text-lg md:text-2xl text-slate-200 mb-10 drop-shadow-md">El mejor servicio para vos.</p>
            <a id="heroReservarBtn" href="calendarioMensual.html" class="inline-block bg-primary text-white px-8 py-4 rounded-xl font-bold text-lg hover:shadow-2xl hover:shadow-primary/30 hover:-translate-y-1 transition-all">
                Solicitar un Turno Ahora
            </a>
        </div>
    </header>

    <!-- Services Section -->
    <main class="flex-1 w-full relative z-10">
        <!-- Sobre Nosotros -->
        <section id="sectionTextoLocal" class="hidden py-20 px-6 max-w-4xl mx-auto text-center">
            <h2 class="text-3xl md:text-4xl font-extrabold font-display mb-6 text-slate-800">Sobre Nosotros</h2>
            <p id="publicTextoLocal" class="text-lg text-slate-600 leading-relaxed whitespace-pre-wrap"></p>
        </section>

        <!-- Equipo / Profesionales -->
        <section id="sectionProfesionales" class="hidden py-20 px-6 bg-slate-100">
            <div class="max-w-7xl mx-auto">
                <div class="text-center mb-16">
                    <h2 class="text-3xl md:text-4xl font-extrabold font-display mb-4 text-slate-800">Nuestro Equipo</h2>
                    <div class="w-24 h-1 bg-primary mx-auto rounded-full"></div>
                </div>
                <div id="publicProfesionalesList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
            </div>
        </section>

        <section id="sectionServicios" class="py-20 px-6 max-w-7xl mx-auto">
            <div class="text-center mb-16">
                <h2 class="text-3xl md:text-4xl font-extrabold font-display mb-4 text-slate-800">Nuestros Servicios</h2>
                <div class="w-24 h-1 bg-primary mx-auto rounded-full"></div>
            </div>
            <div id="servicesGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
        </section>

        <!-- Cursos -->
        <section id="sectionCursos" class="hidden py-20 px-6 bg-slate-100">
            <div class="max-w-7xl mx-auto">
                <div class="text-center mb-16">
                    <h2 class="text-3xl md:text-4xl font-extrabold font-display mb-4 text-slate-800">Cursos y Certificados</h2>
                    <div class="w-24 h-1 bg-primary mx-auto rounded-full"></div>
                </div>
                <div id="publicCursos" class="mb-10 text-slate-700 max-w-4xl mx-auto text-center"></div>
                <div id="publicCursosList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
            </div>
        </section>

        <!-- Ubicación -->
        <section id="sectionUbicacionMaps" class="hidden py-20 px-6 max-w-5xl mx-auto text-center">
            <h2 class="text-3xl md:text-4xl font-extrabold font-display mb-10 text-slate-800">Dónde Encontrarnos</h2>
            <div id="publicUbicacionMaps" class="w-full rounded-3xl overflow-hidden shadow-lg border border-slate-200 aspect-video md:aspect-[21/9]"></div>
        </section>
    </main>

    <footer class="bg-white border-t border-slate-200 py-10 text-center text-slate-500">
        <div id="publicSocialLinks" class="hidden justify-center gap-4 mb-6"></div>
        <p>&copy; <span id="year"></span> <span id="footerName">Mi Negocio</span>. Todos los derechos reservados.</p>
        <p class="text-xs mt-2">
            Desarrollado con <a href="index.html" target="_blank" class="font-semibold text-primary hover:underline">Agendatina</a>
        </p>
    </footer>

    <script src="backend/js/script.js" defer></script>
    <script src="backend/js/web.js" defer></script>
</body>
</html>
