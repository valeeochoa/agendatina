<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Agenda Virtual | Administración</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%233b82f6'><path d='M19 4h-1V2h-2v2H8V2H6v2H5c-1.11 0-1.99.9-1.99 2L3 20c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 16H5V10h14v10zm0-12H5V6h14v2zm-2.5 5.43l-4.57 4.57-2.43-2.43 1.41-1.41 1.02 1.02 3.16-3.16 1.41 1.41z'/></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <style> body { font-family: 'Inter', sans-serif; } </style>
</head>
<body class="bg-slate-100 text-slate-800 min-h-screen p-4 md:p-8 overflow-x-hidden">

    <div class="max-w-7xl mx-auto">
        <!-- Cabecera -->
        <div class="flex justify-between items-center flex-wrap gap-4 bg-white p-6 rounded-2xl shadow-sm mb-8 border border-slate-200">
            <div class="flex items-center gap-3">
                <div class="bg-blue-100 text-blue-600 p-2 rounded-lg flex"><span class="material-symbols-outlined">calendar_month</span></div>
                <h1 class="text-2xl font-extrabold tracking-tight">Mi Agenda Virtual</h1>
            </div>
            <div class="flex items-center gap-4">
                <button onclick="openReportErrorModal('Agenda Virtual')" class="text-xs font-bold text-red-500 bg-red-50 hover:bg-red-100 px-3 py-2 rounded-lg flex items-center gap-1 transition-colors">
                    <span class="material-symbols-outlined text-[16px]">bug_report</span> Reportar Error
                </button>
                <a href="dashboard.html" class="text-sm font-semibold text-slate-500 hover:text-blue-600 transition-colors flex items-center gap-1">
                    <span class="material-symbols-outlined text-sm">arrow_back</span> Volver al panel
                </a>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <!-- POR CONFIRMAR -->
            <div class="lg:col-span-1 flex flex-col gap-4">
                <h2 class="text-lg font-bold flex items-center gap-2 text-amber-600">
                    <span class="material-symbols-outlined text-[20px]">pending_actions</span> Por Confirmar
                </h2>
                <div id="lista-pendientes" class="space-y-4">
                    <p class="text-sm text-slate-500">Cargando solicitudes...</p>
                </div>
            </div>

            <!-- CONFIRMADOS Y HISTORIAL -->
            <div class="lg:col-span-2 bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden flex flex-col">
                <div class="border-b border-slate-100 bg-slate-50 p-2 flex gap-2">
                    <button id="tabProximos" class="flex-1 py-2 text-sm font-bold rounded-lg bg-white shadow-sm text-primary flex items-center justify-center gap-1 transition-colors" onclick="switchAgendaTab('proximos')">
                        <span class="material-symbols-outlined text-[18px]">event_available</span> Próximos
                    </button>
                    <button id="tabHistorial" class="flex-1 py-2 text-sm font-bold rounded-lg text-slate-500 hover:text-slate-700 flex items-center justify-center gap-1 transition-colors" onclick="switchAgendaTab('historial')">
                        <span class="material-symbols-outlined text-[18px]">history</span> Historial
                    </button>
                </div>
                <div class="p-4 md:p-6">
                    <div id="lista-confirmados" class="space-y-4">
                        <!-- Los turnos confirmados se renderizan aquí -->
                    </div>
                    <div id="lista-historial" class="space-y-4 hidden">
                        <!-- Los turnos pasados se renderizan aquí -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Contenedor para Toasts -->
    <div id="toast-container" class="fixed bottom-6 right-6 z-[60] flex flex-col gap-3 pointer-events-none"></div>

    <!-- Modal Confirmación -->
    <div id="confirmModal" class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-50 hidden flex items-center justify-center p-4 opacity-0 transition-opacity duration-300">
        <div class="bg-white rounded-3xl shadow-2xl max-w-sm w-full p-6 transform scale-95 transition-transform duration-300 text-center" id="confirmModalContent">
            <div class="w-16 h-16 bg-amber-100 text-amber-600 rounded-full flex items-center justify-center mx-auto mb-4">
                <span class="material-symbols-outlined text-3xl">warning</span>
            </div>
            <h3 class="text-xl font-bold text-slate-800 mb-2" id="confirmTitle">Confirmar Acción</h3>
            <p class="text-slate-500 text-sm mb-6" id="confirmMessage">¿Estás seguro?</p>
            <div class="flex gap-3 justify-center">
                <button id="btnCancelConfirm" onclick="closeConfirm()" class="px-4 py-2.5 text-sm font-bold text-slate-600 bg-slate-100 hover:bg-slate-200 rounded-xl transition-colors flex-1">Cancelar</button>
                <button id="btnAcceptConfirm" class="px-4 py-2.5 text-sm font-bold text-white rounded-xl transition-colors flex-1">Aceptar</button>
            </div>
        </div>
    </div>

    <!-- Modal Reportar Error -->
    <div id="reportErrorModal" class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-[150] hidden flex items-center justify-center p-4 opacity-0 transition-opacity duration-300">
        <div class="bg-white rounded-[2.5rem] shadow-2xl border border-slate-100 max-w-md w-full p-8 transform scale-95 transition-transform duration-300" id="reportErrorModalContent">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-bold font-display text-slate-800 flex items-center gap-2">
                    <span class="material-symbols-outlined text-red-500">bug_report</span> Reportar Error
                </h2>
                <button onclick="closeReportErrorModal()" class="text-slate-400 hover:text-red-500 transition-colors"><span class="material-symbols-outlined">close</span></button>
            </div>
            <form id="reportErrorForm" class="space-y-4">
                <input type="hidden" id="reportSegment" name="segmento" value="">
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">Sección donde ocurrió:</label>
                    <input type="text" id="reportSegmentDisplay" class="w-full bg-slate-100 text-slate-500 px-4 py-3 rounded-xl cursor-not-allowed border-none font-medium text-sm" readonly>
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">Describe el problema:</label>
                    <textarea name="mensaje" rows="4" required placeholder="¿Qué estabas intentando hacer y qué ocurrió?" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 focus:ring-2 focus:ring-primary outline-none text-sm text-slate-700 resize-none"></textarea>
                </div>
                <button type="submit" id="btnReportSubmit" class="w-full bg-red-500 hover:bg-red-600 text-white font-bold py-3.5 rounded-xl mt-2 transition-all flex items-center justify-center gap-2">Enviar Reporte</button>
            </form>
        </div>
    </div>

    <script src="backend/js/script.js" defer></script>
    <script src="backend/js/agenda.js" defer></script>
</body>
</html>
